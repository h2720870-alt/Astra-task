<!DOCTYPE html>
<html lang="ja" style="background-color: black; height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Astra Home & Beauty</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
        html, body { 
            background-color: black !important; 
            color: white; 
            font-family: 'Noto Sans JP', sans-serif; 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; position: fixed; 
        }
        #root { height: 100%; width: 100%; background-color: black; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; -webkit-tap-highlight-color: transparent; outline: none; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }

        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            height: 100dvh; width: 100vw;
        }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }
        .loader-bar { width: 140px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; margin-top: 24px; }
        .loader-progress { width: 0%; height: 100%; background: #6366f1; animation: load 2.5s ease-in-out forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        .fab-menu-item { transform: translateY(20px); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .fab-open .fab-menu-item { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .active-tab { background-color: white !important; color: black !important; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
        .fab-label { font-size: 9px; font-weight: 900; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        
        .notification-toast { animation: slideInUp 0.3s ease-out forwards; }
        @keyframes slideInUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="splash-screen">
        <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="48" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="4 4"/>
            <path d="M50 20L55 45L80 50L55 55L50 80L45 55L20 50L45 45L50 20Z" fill="#6366f1"/>
            <circle cx="50" cy="50" r="5" fill="white" />
        </svg>
        <h1 class="font-serif font-black tracking-[0.3em] text-sm mt-6 text-indigo-400 uppercase">Astra</h1>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const icon = document.createElement('i');
                    const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                    icon.setAttribute('data-lucide', kebabName);
                    if (className) icon.className = className;
                    icon.style.width = size + 'px';
                    icon.style.height = size + 'px';
                    icon.setAttribute('stroke-width', strokeWidth);
                    iconRef.current.appendChild(icon);
                    window.lucide.createIcons();
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={iconRef} className="inline-flex items-center justify-center flex-shrink-0" />;
        };

        const AVAILABLE_ICONS = [
            'Shirt', 'UtensilsCrossed', 'Broom', 'ChefHat', 'ShoppingCart', 'Droplet', 'Bed', 'Trash2',
            'Droplets', 'Heart', 'Wind', 'Hand', 'Activity', 'Moon', 'Apple', 'Flame',
            'Home', 'Sparkles', 'Scissors', 'Bath', 'Waves', 'Zap', 'Smile', 'Star'
        ];

        const AVAILABLE_COLORS = [
            { color: 'text-blue-400', bgColor: 'bg-blue-400/10' },
            { color: 'text-pink-400', bgColor: 'bg-pink-400/10' },
            { color: 'text-emerald-400', bgColor: 'bg-emerald-400/10' },
            { color: 'text-orange-400', bgColor: 'bg-orange-400/10' },
            { color: 'text-cyan-400', bgColor: 'bg-cyan-400/10' },
            { color: 'text-purple-400', bgColor: 'bg-purple-400/10' },
            { color: 'text-yellow-400', bgColor: 'bg-yellow-400/10' },
            { color: 'text-rose-400', bgColor: 'bg-rose-400/10' },
            { color: 'text-amber-400', bgColor: 'bg-amber-400/10' },
            { color: 'text-lime-400', bgColor: 'bg-lime-400/10' },
        ];

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [isFabOpen, setIsFabOpen] = useState(false);
            const [todayDate, setTodayDate] = useState("");
            const [weather, setWeather] = useState({ location: '位置情報取得中...', temp: '--', icon: 'Cloud' });
            const [notifications, setNotifications] = useState([]);
            const [notificationPermission, setNotificationPermission] = useState('default');

            const [categories, setCategories] = useState([
                { category: 'chores', label: '家事', icon: 'Home', color: 'text-blue-400', bgColor: 'bg-blue-400/10' },
                { category: 'beauty', label: '美容', icon: 'Sparkles', color: 'text-pink-400', bgColor: 'bg-pink-400/10' }
            ]);

            const [customItems, setCustomItems] = useState({
                chores: [
                    { id: 'laundry', label: '洗濯', icon: 'Shirt', color: 'text-blue-400', bgColor: 'bg-blue-400/10' },
                    { id: 'dishes', label: '食器洗い', icon: 'UtensilsCrossed', color: 'text-orange-400', bgColor: 'bg-orange-400/10' },
                    { id: 'cleaning', label: '掃除', icon: 'Broom', color: 'text-emerald-400', bgColor: 'bg-emerald-400/10' },
                    { id: 'cooking', label: '料理', icon: 'ChefHat', color: 'text-pink-400', bgColor: 'bg-pink-400/10' },
                ],
                beauty: [
                    { id: 'skincare', label: 'スキンケア', icon: 'Droplets', color: 'text-rose-400', bgColor: 'bg-rose-400/10' },
                    { id: 'makeup', label: 'メイク', icon: 'Heart', color: 'text-pink-400', bgColor: 'bg-pink-400/10' },
                    { id: 'haircare', label: 'ヘアケア', icon: 'Wind', color: 'text-amber-400', bgColor: 'bg-amber-400/10' },
                ]
            });

            const [customFrequencies, setCustomFrequencies] = useState([
                { id: 'daily', label: '毎日', interval: 1 },
                { id: 'every2days', label: '2日ごと', interval: 2 },
                { id: 'weekly', label: '週1回', interval: 7 },
                { id: 'monthly', label: '月1回', interval: 30 }
            ]);

            const [todayTasks, setTodayTasks] = useState([
                { id: 1, text: "朝食の準備", category: 'chores', item: 'cooking', completed: false, time: "07:00" },
                { id: 2, text: "スキンケア（朝）", category: 'beauty', item: 'skincare', completed: false, time: "07:30" },
            ]);

            const [schedules, setSchedules] = useState([
                { id: 's1', text: "洗濯", category: 'chores', item: 'laundry', lastDone: '2026-04-14', frequency: 'every2days', nextDue: '2026-04-15' },
                { id: 's2', text: "スキンケア", category: 'beauty', item: 'skincare', lastDone: '2026-04-14', frequency: 'daily', nextDue: '2026-04-15' },
            ]);

            const [logs, setLogs] = useState([
                { id: 1, date: '2026-04-14', category: 'chores', item: 'laundry', text: '洗濯完了', time: '10:30', notes: 'シーツも一緒に' },
            ]);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isScheduleModalOpen, setIsScheduleModalOpen] = useState(false);
            
            const [editingTask, setEditingTask] = useState(null);
            const [editingSchedule, setEditingSchedule] = useState(null);
            
            const [taskInput, setTaskInput] = useState('');
            const [taskCategory, setTaskCategory] = useState('chores');
            const [taskItem, setTaskItem] = useState('cooking');
            const [taskTime, setTaskTime] = useState('');
            
            const [scheduleText, setScheduleText] = useState('');
            const [scheduleCategory, setScheduleCategory] = useState('chores');
            const [scheduleItem, setScheduleItem] = useState('laundry');
            const [scheduleFreq, setScheduleFreq] = useState('weekly');
            
            const [editingCategoryItem, setEditingCategoryItem] = useState(null);
            const [newCatName, setNewCatName] = useState('');
            const [newCatIcon, setNewCatIcon] = useState('Home');
            const [newCatColor, setNewCatColor] = useState(0);
            
            const [editingCategoryForItems, setEditingCategoryForItems] = useState('chores');
            const [newItemName, setNewItemName] = useState('');
            const [newItemIcon, setNewItemIcon] = useState('Shirt');
            const [newItemColor, setNewItemColor] = useState(0);
            
            const [newFreqName, setNewFreqName] = useState('');
            const [newFreqDays, setNewFreqDays] = useState('');

            const addNotification = (message, type = 'info') => {
                const id = Date.now();
                const notification = { id, message, type };
                setNotifications(prev => [...prev, notification]);
                
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 5000);
            };

            const sendBrowserNotification = (title, options = {}) => {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification(title, {
                        icon: '🏠',
                        badge: '🏠',
                        ...options
                    });
                }
            };

            useEffect(() => {
                const checkNotifications = () => {
                    const today = new Date().toISOString().split('T')[0];
                    
                    schedules.forEach(schedule => {
                        if (schedule.nextDue === today) {
                            const itemData = customItems[schedule.category]?.find(c => c.id === schedule.item);
                            const message = `${schedule.text}の時間です！`;
                            addNotification(message, 'reminder');
                            sendBrowserNotification('Astra', { body: message });
                        }
                    });
                };

                const interval = setInterval(checkNotifications, 60000);
                checkNotifications();
                
                return () => clearInterval(interval);
            }, [schedules, customItems]);

            useEffect(() => {
                if ('Notification' in window) {
                    setNotificationPermission(Notification.permission);
                }

                const now = new Date();
                setTodayDate(now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }));
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            fetchWeather(latitude, longitude);
                        },
                        (error) => {
                            setWeather({ location: '位置情報取得不可', temp: '--', icon: 'AlertCircle' });
                        }
                    );
                }
                
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    if (splash) splash.classList.add('splash-hidden');
                }, 2000);
            }, []);

            const fetchWeather = async (lat, lon) => {
                try {
                    const apiKey = 'a6d3635659a3bef3af144e690dcc6853';
                    const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric&lang=ja`);
                    
                    if (!response.ok) {
                        throw new Error('天気取得失敗');
                    }
                    
                    const data = await response.json();
                    
                    const weatherDescription = data.weather[0].main;
                    let weatherIcon = 'Cloud';
                    
                    if (weatherDescription === 'Clear') weatherIcon = 'Sun';
                    else if (weatherDescription === 'Clouds') weatherIcon = 'Cloud';
                    else if (weatherDescription === 'Rain') weatherIcon = 'CloudRain';
                    else if (weatherDescription === 'Snow') weatherIcon = 'CloudSnow';
                    else if (weatherDescription === 'Thunderstorm') weatherIcon = 'CloudLightning';
                    
                    setWeather({
                        location: data.name,
                        temp: Math.round(data.main.temp),
                        icon: weatherIcon
                    });
                } catch (error) {
                    console.error('天気取得エラー:', error);
                    setWeather({ location: '東京', temp: 20, icon: 'Cloud' });
                }
            };

            const requestNotificationPermission = () => {
    if ('Notification' in window) {
        if (Notification.permission === 'granted') {
            alert('通知は既に有効です！');
        } else if (Notification.permission !== 'denied') {
            Notification.requestPermission().then(permission => {
                setNotificationPermission(permission);
                if (permission === 'granted') {
                    alert('通知が有効になりました！');
                    sendBrowserNotification('Astra', { body: 'これからは通知を受け取ります！' });
                    // ★ 2秒後にダッシュボードに戻す
                    setTimeout(() => {
                        setView('dashboard');
                    }, 2000);
                }
            });
        } else {
            alert('通知がブラウザで拒否されています。ブラウザの設定を確認してください。');
        }
    }
};

            const addCategory = () => {
                if (!newCatName.trim()) return;
                const colors = AVAILABLE_COLORS[newCatColor];
                const newCat = {
                    category: 'cat_' + Date.now(),
                    label: newCatName,
                    icon: newCatIcon,
                    color: colors.color,
                    bgColor: colors.bgColor
                };
                setCategories([...categories, newCat]);
                setCustomItems({...customItems, [newCat.category]: []});
                setNewCatName('');
                setNewCatIcon('Home');
                setNewCatColor(0);
            };

            const updateCategory = () => {
                setCategories(categories.map(c => c.category === editingCategoryItem.category ? {...c, label: newCatName, icon: newCatIcon} : c));
                setEditingCategoryItem(null);
                setNewCatName('');
            };

            const deleteCategory = (cat) => {
                setCategories(categories.filter(c => c.category !== cat.category));
                const newItems = {...customItems};
                delete newItems[cat.category];
                setCustomItems(newItems);
                
                setSchedules(schedules.filter(s => s.category !== cat.category));
                setTodayTasks(todayTasks.filter(t => t.category !== cat.category));
            };

            const addCustomItem = () => {
                if (!newItemName.trim()) return;
                const colors = AVAILABLE_COLORS[newItemColor];
                const newItem = {
                    id: 'custom_' + Date.now(),
                    label: newItemName,
                    icon: newItemIcon,
                    color: colors.color,
                    bgColor: colors.bgColor
                };
                
                setCustomItems({
                    ...customItems,
                    [editingCategoryForItems]: [...(customItems[editingCategoryForItems] || []), newItem]
                });
                
                setNewItemName('');
                setNewItemIcon('Shirt');
                setNewItemColor(0);
            };

            const deleteCustomItem = (id) => {
                if (id.startsWith('custom_')) {
                    setCustomItems({
                        ...customItems,
                        [editingCategoryForItems]: customItems[editingCategoryForItems].filter(item => item.id !== id)
                    });
                }
            };

            const addCustomFrequency = () => {
                if (!newFreqName.trim() || !newFreqDays.trim()) return;
                
                const newFreq = {
                    id: 'freq_' + Date.now(),
                    label: newFreqName,
                    interval: parseInt(newFreqDays)
                };
                
                setCustomFrequencies([...customFrequencies, newFreq]);
                setNewFreqName('');
                setNewFreqDays('');
            };

            const deleteCustomFrequency = (id) => {
                if (id.startsWith('freq_')) {
                    setCustomFrequencies(customFrequencies.filter(freq => freq.id !== id));
                }
            };

            const toggleTask = (id) => setTodayTasks(todayTasks.map(x=>x.id===id?{...x,completed:!x.completed}:x));

            const openTaskEdit = (task) => {
                setEditingTask(task);
                setTaskInput(task.text);
                setTaskCategory(task.category);
                setTaskItem(task.item);
                setTaskTime(task.time || '');
                setIsTaskModalOpen(true);
            };

            const saveTask = () => {
                if (editingTask) {
                    setTodayTasks(todayTasks.map(t => t.id === editingTask.id ? { ...t, text: taskInput, category: taskCategory, item: taskItem, time: taskTime } : t));
                } else {
                    setTodayTasks([{id:Date.now(), text:taskInput, category:taskCategory, item:taskItem, completed:false, time:taskTime}, ...todayTasks]);
                }
                setIsTaskModalOpen(false); setEditingTask(null); setTaskInput('');
            };

            const openScheduleEdit = (schedule) => {
                setEditingSchedule(schedule);
                setScheduleText(schedule.text);
                setScheduleCategory(schedule.category);
                setScheduleItem(schedule.item);
                setScheduleFreq(schedule.frequency);
                setIsScheduleModalOpen(true);
            };

            const saveSchedule = () => {
                if (editingSchedule) {
                    setSchedules(schedules.map(s => s.id === editingSchedule.id ? { ...s, text: scheduleText, category: scheduleCategory, item: scheduleItem, frequency: scheduleFreq } : s));
                } else {
                    const freq = customFrequencies.find(f => f.id === scheduleFreq);
                    const nextDate = new Date();
                    nextDate.setDate(nextDate.getDate() + freq.interval);
                    setSchedules([{id:'s'+Date.now(), text:scheduleText, category:scheduleCategory, item:scheduleItem, frequency:scheduleFreq, lastDone: new Date().toISOString().split('T')[0], nextDue: nextDate.toISOString().split('T')[0]}, ...schedules]);
                }
                setIsScheduleModalOpen(false); setEditingSchedule(null); setScheduleText('');
            };

            const markScheduleDone = (id) => {
                setSchedules(schedules.map(s => {
                    if (s.id === id) {
                        const freq = customFrequencies.find(f => f.id === s.frequency);
                        const nextDate = new Date();
                        nextDate.setDate(nextDate.getDate() + freq.interval);
                        return { ...s, lastDone: new Date().toISOString().split('T')[0], nextDue: nextDate.toISOString().split('T')[0] };
                    }
                    return s;
                }));
            };

            const TaskItem = ({ task }) => {
                const itemData = customItems[task.category]?.find(c => c.id === task.item);
                return (
                    <div className={`group flex items-center gap-4 p-5 rounded-[2rem] border transition-all ${task.completed ? 'opacity-40 bg-emerald-950/10 border-emerald-500/10' : 'bg-white/5 border-white/10 hover:bg-white/10'}`}>
                        <div 
                            onClick={(e) => { e.stopPropagation(); toggleTask(task.id); }} 
                            className={`w-6 h-6 rounded-lg border flex items-center justify-center cursor-pointer flex-shrink-0 ${task.completed ? 'bg-emerald-400 border-emerald-400' : 'border-zinc-700'}`}
                        >
                            {task.completed && <Icon name="Check" size={14} className="text-black" strokeWidth={4} />}
                        </div>
                        <div className="flex-1 overflow-hidden cursor-pointer" onClick={() => openTaskEdit(task)}>
                            <div className="flex items-center gap-2">
                                <span className={`text-sm font-medium ${task.completed ? 'line-through text-zinc-500' : 'text-zinc-200'}`}>{task.text}</span>
                                {task.time && <span className="text-[10px] text-indigo-400 font-bold">{task.time}</span>}
                            </div>
                            <p className="text-[10px] text-zinc-500 font-mono mt-1 uppercase tracking-wider">{itemData?.label}</p>
                        </div>
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${itemData?.bgColor}`}><Icon name={itemData?.icon} size={16} className={itemData?.color} /></div>
                    </div>
                );
            };

            const renderDashboard = () => {
                const urgentSchedules = schedules.filter(s => {
                    const dueDate = new Date(s.nextDue);
                    const today = new Date();
                    return dueDate <= today;
                });

                return (
                    <div className="px-6 pt-12 pb-32 space-y-6 animate-in overflow-y-auto h-full text-white">
                        <div className="flex justify-between items-center px-2 mb-4">
                            <h2 className="text-lg font-black font-serif uppercase tracking-tight text-zinc-200 opacity-90">{todayDate}</h2>
                            <div className="flex items-center gap-2.5 px-4 py-2 bg-white/5 rounded-2xl border border-white/5">
                                <Icon name={weather.icon} size={20} className="text-amber-400" />
                                <div className="flex flex-col items-end">
                                    <span className="text-xs font-black uppercase tracking-widest text-zinc-200">{weather.temp}°C</span>
                                    <span className="text-[9px] text-zinc-500">{weather.location}</span>
                                </div>
                            </div>
                        </div>

                        {urgentSchedules.length > 0 && (
                            <div className="bg-amber-600/20 border border-amber-500/30 rounded-[2.5rem] p-6 space-y-3">
                                <div className="flex items-center gap-2 text-amber-400"><Icon name="AlertCircle" size={16} /><span className="text-[10px] font-black uppercase">緊急</span></div>
                                <div className="space-y-2">
                                    {urgentSchedules.map(s => (
                                        <div key={s.id} className="flex items-center justify-between p-2 bg-amber-950/30 rounded-lg">
                                            <span className="text-xs text-amber-200">{s.text}</span>
                                            <button onClick={() => markScheduleDone(s.id)} className="text-[10px] px-2 py-1 bg-amber-500 text-black rounded hover:bg-amber-400">完了</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="space-y-4">
                            <div className="flex items-center gap-2 px-2">
                                <Icon name="ListTodo" size={14} className="text-emerald-400" />
                                <h3 className="text-[10px] font-bold tracking-widest uppercase text-zinc-400">今日のタスク</h3>
                            </div>
                            <div className="space-y-2">{todayTasks.map(t => <TaskItem key={t.id} task={t} />)}</div>
                        </div>
                    </div>
                );
            };

            const renderScheduleView = () => (
                <div className="p-6 pt-12 animate-in h-full overflow-y-auto pb-40 space-y-10 text-white">
                    <section className="space-y-6">
                        <div className="flex items-center gap-3 px-2">
                            <Icon name="Calendar" className="text-cyan-400" size={24} />
                            <h2 className="text-2xl font-black font-serif uppercase tracking-tight">定期管理</h2>
                        </div>
                        <div className="space-y-4">
                            {schedules.map(s => {
                                const itemData = customItems[s.category]?.find(c => c.id === s.item);
                                const freq = customFrequencies.find(f => f.id === s.frequency);
                                const daysOverdue = Math.floor((new Date() - new Date(s.nextDue)) / 86400000);
                                const isOverdue = daysOverdue > 0;
                                
                                return (
                                    <div key={s.id} className="glass-card p-6 rounded-[2.5rem] flex items-center gap-4 group">
                                        <div className="flex-1 overflow-hidden space-y-2">
                                            <div className="flex items-center gap-2">
                                                <h4 className="font-bold text-lg text-zinc-200">{s.text}</h4>
                                                {isOverdue && <span className="text-[10px] bg-red-500 text-white px-2 py-1 rounded">{daysOverdue}日超過</span>}
                                            </div>
                                            <p className="text-[10px] text-zinc-500 uppercase">周期: {freq?.label} | 次: {s.nextDue}</p>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => markScheduleDone(s.id)} className="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-zinc-400 hover:bg-emerald-500 hover:text-black transition-all"><Icon name="Check" size={20} /></button>
                                            <button onClick={() => openScheduleEdit(s)} className="w-10 h-12 text-zinc-600 hover:text-white flex items-center justify-center"><Icon name="Pencil" size={16} /></button>
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${itemData?.bgColor}`}><Icon name={itemData?.icon} size={24} className={itemData?.color} /></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </section>

                    <section className="space-y-6 border-t border-white/10 pt-6">
                        <div className="flex items-center gap-3 px-2">
                            <Icon name="ListTodo" className="text-emerald-400" size={24} />
                            <h2 className="text-2xl font-black font-serif uppercase tracking-tight">タスクリスト</h2>
                        </div>
                        <div className="space-y-3">
                            {todayTasks.map(t => <TaskItem key={t.id} task={t} />)}
                        </div>
                    </section>
                </div>
            );

            const renderHistoryView = () => (
                <div className="p-6 pt-12 animate-in h-full overflow-y-auto pb-40 space-y-8 text-white">
                    <header className="flex items-center gap-3 px-2"><Icon name="History" className="text-indigo-400" size={24} /><h2 className="text-2xl font-black font-serif uppercase tracking-tight">完了ログ</h2></header>
                    <div className="space-y-8 relative pl-12">
                        <div className="absolute left-[20px] top-4 bottom-4 w-[1px] bg-white/10" />
                        {logs.map(log => {
                            const itemData = customItems[log.category]?.find(c => c.id === log.item);
                            return (
                                <div key={log.id} className="relative animate-in bg-white/5 border border-white/10 p-6 rounded-[2.5rem] space-y-4 shadow-xl backdrop-blur-md">
                                    <div className={`absolute -left-12 top-4 w-10 h-10 rounded-full border border-white/10 bg-zinc-900 flex items-center justify-center shadow-xl ${itemData?.color}`}><Icon name={itemData?.icon} size={18} /></div>
                                    <div className="flex justify-between items-start">
                                        <p className="text-[9px] text-zinc-500 font-mono uppercase tracking-widest">{log.date} · {log.time}</p>
                                        {itemData && <span className={`text-[9px] font-black uppercase ${itemData.color}`}>{itemData.label}</span>}
                                    </div>
                                    <p className="text-sm font-medium text-zinc-200">{log.text}</p>
                                    {log.notes && <p className="text-xs text-zinc-400 italic">メモ: {log.notes}</p>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderSettingsView = () => (
                <div className="p-6 pt-12 pb-32 space-y-6 animate-in overflow-y-auto h-full text-white">
                    <header className="flex items-center gap-3 px-2"><Icon name="Settings" className="text-indigo-400" size={24} /><h2 className="text-2xl font-black font-serif uppercase tracking-tight">設定</h2></header>
                    
                    {/* ★ 通知設定セクション */}
                    <section className="bg-indigo-600/20 border border-indigo-500/30 rounded-[2rem] p-6 space-y-3">
                        <div className="flex items-center gap-2 text-indigo-400">
                            <Icon name="Bell" size={16} />
                            <span className="text-sm font-bold">通知設定</span>
                        </div>
                        <p className="text-xs text-indigo-200">定期管理の期日に通知を受け取ります</p>
                        <button 
                            onClick={requestNotificationPermission}
                            className={`w-full font-bold py-3 rounded-lg text-sm transition-all ${
                                notificationPermission === 'granted' 
                                    ? 'bg-emerald-500 text-white hover:bg-emerald-600' 
                                    : 'bg-indigo-500 text-white hover:bg-indigo-600'
                            }`}
                        >
                            {notificationPermission === 'granted' ? '✓ 通知有効' : '通知を有効にする'}
                        </button>
                    </section>

                    <section className="space-y-4">
                        <h3 className="text-lg font-bold">カテゴリー</h3>
                        
                        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 space-y-3">
                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase">名前</label>
                                <input type="text" value={newCatName} onChange={(e)=>setNewCatName(e.target.value)} placeholder="カテゴリー名..." className="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white focus:outline-none text-sm"/>
                            </div>

                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase">アイコン</label>
                                <div className="grid grid-cols-6 gap-1 max-h-32 overflow-y-auto">
                                    {AVAILABLE_ICONS.map(icon => (
                                        <button key={icon} onClick={()=>setNewCatIcon(icon)} className={`p-2 rounded-lg transition-all text-center ${newCatIcon === icon ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                            <Icon name={icon} size={14} className={newCatIcon === icon ? 'text-indigo-400' : 'text-zinc-500'} />
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase">色</label>
                                <div className="grid grid-cols-5 gap-2">
                                    {AVAILABLE_COLORS.map((col, i) => (
                                        <button key={i} onClick={()=>setNewCatColor(i)} className={`w-full h-8 rounded-lg transition-all ${newCatColor === i ? 'ring-2 ring-white' : ''} ${col.bgColor}`}></button>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-2">
                                {editingCategoryItem ? (
                                    <>
                                        <button onClick={updateCategory} className="flex-1 bg-indigo-500 text-white font-bold py-2 rounded-lg text-sm">更新</button>
                                        <button onClick={()=>setEditingCategoryItem(null)} className="flex-1 bg-white/10 text-white font-bold py-2 rounded-lg text-sm">キャンセル</button>
                                    </>
                                ) : (
                                    <button onClick={addCategory} className="w-full bg-indigo-500 text-white font-bold py-2 rounded-lg text-sm">追加</button>
                                )}
                            </div>
                        </div>

                        <div className="space-y-2">
                            <h4 className="text-sm font-bold">既存カテゴリー</h4>
                            <div className="space-y-2">
                                {categories.map(cat => (
                                    <div key={cat.category} className="flex items-center justify-between p-3 bg-white/5 border border-white/10 rounded-lg">
                                        <div className="flex items-center gap-2">
                                            <Icon name={cat.icon} size={16} className={cat.color} />
                                            <span className="text-sm">{cat.label}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {setEditingCategoryItem(cat); setNewCatName(cat.label); setNewCatIcon(cat.icon);}} className="text-[10px] text-indigo-400 hover:text-indigo-300">編集</button>
                                            <button onClick={() => deleteCategory(cat)} className="text-[10px] text-rose-400 hover:text-rose-300">削除</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="space-y-4">
                        <h3 className="text-lg font-bold">タイプ</h3>
                        
                        <div className="space-y-2">
                            <label className="text-[10px] font-bold text-zinc-500 uppercase">カテゴリー</label>
                            <div className="grid grid-cols-2 gap-2">
                                {categories.map(cat => (
                                    <button key={cat.category} onClick={()=>setEditingCategoryForItems(cat.category)} className={`p-3 rounded-lg transition-all ${editingCategoryForItems === cat.category ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                        <Icon name={cat.icon} size={14} className={editingCategoryForItems === cat.category ? cat.color : 'text-zinc-500'} />
                                        <p className="text-[8px] mt-1">{cat.label}</p>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 space-y-3">
                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase">アイコン</label>
                                <div className="grid grid-cols-6 gap-1 max-h-32 overflow-y-auto">
                                    {AVAILABLE_ICONS.map(icon => (
                                        <button key={icon} onClick={()=>setNewItemIcon(icon)} className={`p-2 rounded-lg transition-all text-center ${newItemIcon === icon ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                            <Icon name={icon} size={14} className={newItemIcon === icon ? 'text-indigo-400' : 'text-zinc-500'} />
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-2">
                                <label className="text-[10px] font-bold text-zinc-500 uppercase">色</label>
                                <div className="grid grid-cols-5 gap-2">
                                    {AVAILABLE_COLORS.map((col, i) => (
                                        <button key={i} onClick={()=>setNewItemColor(i)} className={`w-full h-8 rounded-lg transition-all ${newItemColor === i ? 'ring-2 ring-white' : ''} ${col.bgColor}`}></button>
                                    ))}
                                </div>
                            </div>

                            <input type="text" value={newItemName} onChange={(e)=>setNewItemName(e.target.value)} placeholder="タイプ名..." className="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white focus:outline-none text-sm"/>
                            <button onClick={addCustomItem} className="w-full bg-indigo-500 text-white font-bold py-2 rounded-lg text-sm">追加</button>
                        </div>

                        <div className="space-y-2">
                            <h4 className="text-sm font-bold">{categories.find(c=>c.category===editingCategoryForItems)?.label} のタイプ</h4>
                            <div className="space-y-2">
                                {customItems[editingCategoryForItems]?.map(item => (
                                    <div key={item.id} className="flex items-center justify-between p-3 bg-white/5 border border-white/10 rounded-lg">
                                        <div className="flex items-center gap-2">
                                            <Icon name={item.icon} size={14} className={item.color} />
                                            <span className="text-sm">{item.label}</span>
                                        </div>
                                        {item.id.startsWith('custom_') && (
                                            <button onClick={() => deleteCustomItem(item.id)} className="text-[10px] text-rose-400 hover:text-rose-300">削除</button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section className="space-y-4">
                        <h3 className="text-lg font-bold">周期</h3>
                        
                        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 space-y-3">
                            <input type="text" value={newFreqName} onChange={(e)=>setNewFreqName(e.target.value)} placeholder="周期名（例：3日ごと）" className="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white focus:outline-none text-sm"/>
                            <input type="number" value={newFreqDays} onChange={(e)=>setNewFreqDays(e.target.value)} placeholder="日数（例：3）" className="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white focus:outline-none text-sm"/>
                            <button onClick={addCustomFrequency} className="w-full bg-indigo-500 text-white font-bold py-2 rounded-lg text-sm">追加</button>
                        </div>

                        <div className="space-y-2">
                            <h4 className="text-sm font-bold">既存周期</h4>
                            <div className="space-y-2">
                                {customFrequencies?.map(freq => (
                                    <div key={freq.id} className="flex items-center justify-between p-3 bg-white/5 border border-white/10 rounded-lg">
                                        <span className="text-sm">{freq.label} ({freq.interval}日)</span>
                                        {freq.id.startsWith('freq_') && (
                                            <button onClick={() => deleteCustomFrequency(freq.id)} className="text-[10px] text-rose-400 hover:text-rose-300">削除</button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );

            return (
                <div id="root-container" className="h-screen w-full bg-black relative overflow-hidden">
                    <main className="h-full">
                        {view === 'dashboard' && renderDashboard()}
                        {view === 'schedule' && renderScheduleView()}
                        {view === 'history' && renderHistoryView()}
                        {view === 'settings' && renderSettingsView()}
                    </main>

                    {/* ★ 通知トースト表示 */}
                    <div className="fixed top-4 left-4 right-4 z-[999] space-y-2 pointer-events-none">
                        {notifications.map(notif => (
                            <div key={notif.id} className={`notification-toast bg-gradient-to-r ${notif.type === 'reminder' ? 'from-amber-600 to-amber-700' : 'from-indigo-600 to-indigo-700'} text-white p-4 rounded-2xl shadow-xl flex items-center gap-3 max-w-sm pointer-events-auto`}>
                                <Icon name={notif.type === 'reminder' ? 'Bell' : 'Info'} size={20} />
                                <span className="font-medium">{notif.message}</span>
                            </div>
                        ))}
                    </div>

                    {view !== 'chat' && (
                        <div className={`fixed bottom-28 right-6 z-[250] flex flex-col items-end gap-3 ${isFabOpen ? 'fab-open' : ''}`}>
                            <div className="fab-menu-item flex items-center gap-3"><span className="fab-label text-emerald-400">Task</span><button onClick={() => { setEditingTask(null); setTaskInput(''); setTaskCategory('chores'); setTaskItem(customItems.chores[0]?.id); setTaskTime(''); setIsTaskModalOpen(true); setIsFabOpen(false); }} className="w-12 h-12 bg-white/10 border border-white/10 text-emerald-400 rounded-2xl flex items-center justify-center backdrop-blur-md shadow-2xl active:scale-95"><Icon name="Plus" size={22}/></button></div>
                            <div className="fab-menu-item flex items-center gap-3" style={{transitionDelay: '0.05s'}}><span className="fab-label text-amber-400">Schedule</span><button onClick={() => { setEditingSchedule(null); setScheduleText(''); setScheduleCategory('chores'); setScheduleItem(customItems.chores[0]?.id); setScheduleFreq(customFrequencies[0]?.id); setIsScheduleModalOpen(true); setIsFabOpen(false); }} className="w-12 h-12 bg-white/10 border border-white/10 text-amber-400 rounded-2xl flex items-center justify-center backdrop-blur-md shadow-2xl active:scale-95"><Icon name="Calendar" size={22}/></button></div>
                            <button onClick={() => setIsFabOpen(!isFabOpen)} className={`w-14 h-14 bg-indigo-500 text-white rounded-2xl shadow-2xl flex items-center justify-center active:scale-90 transition-all z-[260] shadow-indigo-500/40 ${isFabOpen ? 'rotate-45 bg-zinc-800' : ''}`}><Icon name="Plus" size={28} /></button>
                        </div>
                    )}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-xs bg-zinc-900/90 backdrop-blur-2xl border border-white/5 p-2 rounded-full flex justify-around items-center z-200 shadow-2xl">
                        <button onClick={() => setView('dashboard')} className={`flex-1 flex justify-center p-4 rounded-full transition-all ${view === 'dashboard' ? 'active-tab' : 'text-zinc-600'}`}><Icon name="Home" size={20} /></button>
                        <button onClick={() => setView('schedule')} className={`flex-1 flex justify-center p-4 rounded-full transition-all ${view === 'schedule' ? 'active-tab' : 'text-zinc-600'}`}><Icon name="Calendar" size={20} /></button>
                        <button onClick={() => setView('history')} className={`flex-1 flex justify-center p-4 rounded-full transition-all ${view === 'history' ? 'active-tab' : 'text-zinc-600'}`}><Icon name="BarChart3" size={20} /></button>
                        <button onClick={() => setView('settings')} className={`flex-1 flex justify-center p-4 rounded-full transition-all ${view === 'settings' ? 'active-tab' : 'text-zinc-600'}`}><Icon name="Settings" size={20} /></button>
                    </nav>

                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[300] bg-black/80 flex items-end p-4 animate-in text-white">
                            <div className="w-full max-w-sm bg-zinc-900 border border-white/10 rounded-[3rem] p-8 space-y-6 mb-8 shadow-2xl max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center"><h3 className="text-xl font-bold uppercase tracking-widest">{editingTask ? 'タスク編集' : 'タスク追加'}</h3><button onClick={()=>setIsTaskModalOpen(false)}><Icon name="X" size={24}/></button></div>
                                <input type="text" value={taskInput} onChange={(e)=>setTaskInput(e.target.value)} placeholder="タスク内容..." className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:outline-none"/>
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">カテゴリー</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {categories.map(cat => (
                                            <button key={cat.category} onClick={()=>{setTaskCategory(cat.category); setTaskItem(customItems[cat.category][0]?.id);}} className={`p-3 rounded-lg transition-all ${taskCategory === cat.category ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                                <Icon name={cat.icon} size={16} className={taskCategory === cat.category ? cat.color : 'text-zinc-500'} />
                                                <p className="text-[8px] mt-1">{cat.label}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">タイプ</label>
                                    <div className="grid grid-cols-4 gap-1 max-h-32 overflow-y-auto">
                                        {customItems[taskCategory]?.map(item => (
                                            <button key={item.id} onClick={()=>setTaskItem(item.id)} className={`p-2 rounded-lg transition-all text-center ${taskItem === item.id ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                                <Icon name={item.icon} size={14} className={taskItem === item.id ? item.color : 'text-zinc-500'} />
                                                <p className="text-[7px] mt-0.5">{item.label}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <input type="time" value={taskTime} onChange={(e)=>setTaskTime(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-2xl p-3 text-xs text-white"/>
                                <div className="flex gap-2">
                                    {editingTask && <button onClick={()=>{setTodayTasks(todayTasks.filter(t=>t.id!==editingTask.id));setIsTaskModalOpen(false);}} className="flex-1 bg-rose-500/10 text-rose-500 font-black py-4 rounded-3xl uppercase">Delete</button>}
                                    <button onClick={saveTask} className="flex-[2] bg-white text-black font-black py-4 rounded-3xl uppercase tracking-widest">Save</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isScheduleModalOpen && (
                        <div className="fixed inset-0 z-[300] bg-black/80 flex items-end p-4 animate-in text-white">
                            <div className="w-full max-w-sm bg-zinc-900 border border-white/10 rounded-[3rem] p-8 space-y-6 mb-8 shadow-2xl max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center"><h3 className="text-xl font-bold uppercase tracking-widest">{editingSchedule ? 'スケジュール編集' : 'スケジュール追加'}</h3><button onClick={()=>setIsScheduleModalOpen(false)}><Icon name="X" size={24}/></button></div>
                                <input type="text" value={scheduleText} onChange={(e)=>setScheduleText(e.target.value)} placeholder="内容..." className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:outline-none"/>
                                
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">カテゴリー</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {categories.map(cat => (
                                            <button key={cat.category} onClick={()=>{setScheduleCategory(cat.category); setScheduleItem(customItems[cat.category][0]?.id);}} className={`p-3 rounded-lg transition-all ${scheduleCategory === cat.category ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                                <Icon name={cat.icon} size={16} className={scheduleCategory === cat.category ? cat.color : 'text-zinc-500'} />
                                                <p className="text-[8px] mt-1">{cat.label}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">タイプ</label>
                                    <div className="grid grid-cols-4 gap-1 max-h-32 overflow-y-auto">
                                        {customItems[scheduleCategory]?.map(item => (
                                            <button key={item.id} onClick={()=>setScheduleItem(item.id)} className={`p-2 rounded-lg transition-all text-center ${scheduleItem === item.id ? 'bg-white/20 ring-1 ring-white' : 'bg-white/5'}`}>
                                                <Icon name={item.icon} size={14} className={scheduleItem === item.id ? item.color : 'text-zinc-500'} />
                                                <p className="text-[7px] mt-0.5">{item.label}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase">周期</label>
                                    <select value={scheduleFreq} onChange={(e)=>setScheduleFreq(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-white text-sm focus:outline-none">
                                        {customFrequencies.map(f => (
                                            <option key={f.id} value={f.id}>{f.label}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex gap-2">
                                    {editingSchedule && <button onClick={()=>{setSchedules(schedules.filter(s=>s.id!==editingSchedule.id));setIsScheduleModalOpen(false);}} className="flex-1 bg-rose-500/10 text-rose-500 font-black py-4 rounded-3xl uppercase">Delete</button>}
                                    <button onClick={saveSchedule} className="flex-[2] bg-white text-black font-black py-4 rounded-3xl uppercase tracking-widest">Save</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
